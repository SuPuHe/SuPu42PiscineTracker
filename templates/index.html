<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>42 Students Progress</title>
    <style>
        body {
            font-family: sans-serif;
            background: #1e1e2f;
            color: white;
            padding: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: #2a2a40;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #3f3f5a;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid #00babc;
            transition: transform 0.2s ease;
        }
        .avatar:hover {
            transform: scale(1.05);
        }
        .level {
            font-size: 1.2em;
            color: #00babc;
            font-weight: bold;
        }
        .exams {
            font-size: 0.8em;
            text-align: left;
            margin-top: 10px;
            background: #1a1a2e;
            padding: 5px;
            border-radius: 5px;
        }
        .exam-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            padding: 2px 0;
        }
        h1 {
            text-align: center;
            color: #00babc;
        }
        a.intra-link {
            color: white;
            text-decoration: none;
        }
        a.intra-link:hover {
            color: #00babc;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h1>42 Students (Feb-Mar 2026)</h1>

<div class="grid">
    {% for student in students %}
    <div class="card">

        <!-- Аватар → Intra -->
        <a href="https://intra.42.fr/users/{{ student.login }}"
           target="_blank">
            <img src="{{ student.image }}" class="avatar" alt="photo">
        </a>

        <!-- Логин → Intra -->
        <h3>
            <a href="https://intra.42.fr/users/{{ student.login }}"
               target="_blank"
               class="intra-link">
                {{ student.login }}
            </a>
        </h3>

        <div class="level">Level: {{ student.level }}</div>

        <div class="exams">
            <strong>Exams:</strong>
            {% for exam in student.exams %}
            <div class="exam-item">
                <span>{{ exam.name }}</span>
                <span>{{ exam.mark }}</span>
            </div>
            {% else %}
            <div>No exams yet</div>
            {% endfor %}
        </div>

    </div>
    {% endfor %}
</div>

</body>
</html>
